# Copy to config.toml for local overrides. Put the token in lichess_bot/.env.
engine = "lichess_bot/bin/labzero-macos-aarch64-0.6.2"
threads = 4
hash_mb = 64

# Live challenges are 3+2 blitz only for now.
clock_limit = 180
clock_increment = 2
max_parallel_games = 1
rated = false
challenge_color = "random" # random, white, or black

# Incoming challenges (--listen / accepted challenges).
accept_from = "any" # any, bot, or human
# Optional hard caps on challenger blitz rating; unset = no cap.
# min_rating = 1800
# max_rating = 2300

# Leave unset for clock-managed UCI play. Set one of these only for local tests.
# search_depth = 4
# movetime_ms = 2000
move_overhead_ms = 500
# max_movetime_ms = 5000

# Optional tablebase/book helpers. Empty lists keep all moves engine-only.
# Syzygy files are local operator data; do not commit them to the repo.
polyglot_books = []
polyglot_max_depth = 20
syzygy_paths = []
syzygy_max_pieces = 7

# Optional sportsmanship features. Keep disabled until tested in casual games.
resign_enabled = false
resign_score = -1000
resign_moves = 3
offer_draw_enabled = false
offer_draw_score = 20
offer_draw_moves = 10
offer_draw_pieces = 10
accept_draw_enabled = true
accept_draw_losing_score = -100
accept_draw_equal_score = 25
accept_draw_equal_pieces = 8
accept_draw_min_ply = 40
accept_draw_low_time_sec = 10
accept_draw_low_time_score = 100

# Local game records and player chat.
pgn_directory = "lichess_bot/local/pgn"
hello = "Hi! I'm {me}. Good luck!"
goodbye = "Good game!"
# "player" is visible to players only. Add "spectator" if you want to see bot
# chat while watching the game as audience.
chat_rooms = ["player"]

# Optional game-start/game-end notifications. Secrets stay in lichess_bot/.env:
# LABZERO_NOTIFY_TELEGRAM_TOKEN=123456:abc
# LABZERO_NOTIFY_TELEGRAM_CHAT_ID=123456789
notify_provider = "none"           # none or telegram
notify_busy_human_challenge = true
notify_radar_after_game = true
notify_radar_after_game_delay_sec = 2
notify_block_summary = true

# Optional oracle feedback loop. Disabled by default; generated JSONL/checkpoints
# stay under ignored data/oracle/, while compact reports can land in docs/oracle/.
oracle_after_block = false
oracle_script = "scripts/host-oracle-label.py"
# oracle_stockfish = "/opt/homebrew/bin/stockfish"
oracle_max_positions = 40
oracle_nodes = 20000
oracle_out_dir = "data/oracle"
oracle_report_dir = "docs/oracle"

# Online bot selection for --challenge-loop.
# Window is own blitz rating + deltas (e.g. 1944 with -100..+250 → 1844–2194).
min_blitz_games = 20
allow_provisional = false
target_rating_min_delta = -100
target_rating_max_delta = 250
# Optional Elo-derived expected-score guard for LabZero against the opponent.
# This is not true W-D-L; it is a rating proxy that avoids stale blacklist churn.
target_expected_score_min = 0.35
target_expected_score_max = 0.60
fallback_blitz_rating = 1950
use_fallback_rating_when_provisional = true
max_challenge_attempts_per_cycle = 8
max_bot_challenges_per_day = 100
bot_challenge_quota_margin = 10
challenge_quota_file = "lichess_bot/local/challenge-quota.json"
challenge_control_file = "lichess_bot/local/challenge-control.json"
avoid_bots_file = "lichess_bot/local/avoid-bots.json"
opponent_cooldown_file = "lichess_bot/local/opponent-cooldown.json"
challenge_interval_sec = 90
cancel_stale_outgoing_challenges = true
opponent_cooldown_sec = 1200
heartbeat_sec = 25

# Sidecar online-bot rating radar. It writes JSONL snapshots under local/.
radar_interval_sec = 30
radar_min_blitz_games = 20
radar_allow_provisional = false
radar_notify_interval_min = 60
radar_output_dir = "lichess_bot/local/bot-radar"
